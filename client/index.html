  <script>
    window.global = window;
    window.process = { env: {} };
    window.onerror = function (msg, url, line, col, error) {
      console.log('[DEBUG] Global Error: ' + msg + ' at ' + url + ':' + line + ':' + col);
      if (error) console.log('[DEBUG] Error object:', error);
      return false;
    };
    window.onunhandledrejection = function (event) {
      console.log('[DEBUG] Global Unhandled Rejection:', event.reason);
    };
    console.log('[DEBUG] Early diagnostic script loaded');
  </script>
</head>
